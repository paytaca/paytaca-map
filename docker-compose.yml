version: "3"
services:
  postgres:
    image: "postgres:12-alpine"
    volumes:
      - paytacamap_db:/var/lib/postgresql/data
    env_file:
      - .env
    expose:
      - "5432"
  redis:
    image: "redis:7-alpine"
    expose:
      - "6379"
    volumes:
      - redis_data:/data
  paytacamap:
    build: .
    command: [ "supervisord", "-c", "/code/supervisord.conf", "--nodaemon" ]
    ports:
      - "8000:8000"
      - "9000:9000"
    env_file:
      - .env
    volumes:
      - .:/code
    depends_on:
      - postgres
      - redis
volumes:
  paytacamap_db:
    external: true
  redis_data:
